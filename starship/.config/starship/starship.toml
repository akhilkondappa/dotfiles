# """

palette = "catppuccin_mocha"

[fill]
symbol = " "

[directory]
truncation_length = 1
truncation_symbol = 'â€¦/'
home_symbol = 'َ°‹œ ~'
read_only_style = 'red'
read_only = ' ï€£ '
format = '[$path]($style)[$read_only]($read_only_style) '

